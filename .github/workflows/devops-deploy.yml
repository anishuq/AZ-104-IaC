name: Deploy Web App Subfolder to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4

      # 2. Set up Python runtime
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies from AppServiceCodeProject
      - name: Install dependencies
        run: |
          cd AppServiceCodeProject
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Deploy ONLY the subfolder contents to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'az104-linuxwebapp-160980'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './AppServiceCodeProject'